  generator: legacy_dc
  physics_model: physics-v1
  model_name: DataCentreFFD
  standalone_timeout_s: 7200
  controls:
    fan_count: 6
    supply_temp_count: 6
  defaults:
    scenario: baseline
    stop_time: 900.0
    sync_dt: 10.0
  validation:
    mat_required: true
    fail_on_stdout_patterns:
    - Segmentation fault
    - Execution failed
    - LOG_ASSERT
    - Variable violating
    fail_on_stderr_patterns:
    - 'error:'
    - assertion
    - segmentation fault
    fail_on_ffd_patterns:
    - ERROR in
    - Could not
