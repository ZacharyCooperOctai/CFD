  thermal_diffusivity: 2.14e-05
  gravity_z: -9.81
output:
  ffd_file: case.ffd
  mesh_file: case.cfd
  obstacle_file: case.dat
  sensor_file: case_sensors.csv
case:
  id: coarse_dc
  generator: legacy_dc
  model_name: DataCentreFFD
  controls:
    fan_count: 6
    supply_temp_count: 6
  defaults:
    scenario: baseline
    stop_time: 30.0
    sync_dt: 10.0
  validation:
    mat_required: true
    fail_on_stdout_patterns:
    - Segmentation fault
    - Execution failed
    - LOG_ASSERT
    - Variable violating
    fail_on_stderr_patterns:
    - 'error:'
    - assertion
    - segmentation fault
    fail_on_ffd_patterns:
    - ERROR in
    - Could not
    - different number
    - Segmentation fault
    variable_bounds:
    - name: dc.T_sup_out[1]
      min: 270.0
      max: 320.0
    - name: dc.T_sup_out[2]
      min: 270.0
      max: 320.0
