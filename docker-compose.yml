services:
  cfd:
    build:
      context: .
      dockerfile: Dockerfile
    image: cfd-openmodelica:local
    working_dir: /workspace
    init: true
    stdin_open: true
    tty: true
    environment:
      CFD_DOCKER_IMAGE: cfd-openmodelica:local
      BUILDINGS_LIBRARY_PACKAGE: /workspace/external/modelica-buildings/Buildings/package.mo
      ISAT_FFD_BIN: /workspace/ffd_isat
      HOME: /home/cfd
      MPLBACKEND: Agg
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NVIDIA_VISIBLE_DEVICES: all
      PYTHONPATH: /workspace/src
      PYTHONUNBUFFERED: "1"
      POCL_CACHE_DIR: /tmp/pocl-cache
      POCL_CPU_MAX_CU_COUNT: "14"
    volumes:
      - .:/workspace
      - omhome:/home/cfd/.openmodelica
      - pocl-cache:/home/cfd/.cache/pocl
      - /usr/lib/wsl:/usr/lib/wsl:ro

volumes:
  omhome:
  pocl-cache:
